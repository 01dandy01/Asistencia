<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro de Asistencia</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --color-bg: #ffffff;
      --color-card: #f9f9f9;
      --color-text: #333;
      --color-ingreso: #2ecc71;
      --color-salida: #3498db;
      --color-refrigerio-inicio: #f39c12;
      --color-refrigerio-fin: #f1c40f;
      --color-error: #e74c3c;
      --color-warning: #e67e22;
      --radius: 10px;
      --shadow: 0 4px 12px rgba(0,0,0,0.1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background-color: var(--color-bg);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      position: relative;
      padding: 20px;
    }

    .logo {
      position: absolute;
      top: 20px;
      left: 20px;
    }

    .logo img {
      height: 160px;
      border-radius: var(--radius);
    }

    .container {
      background-color: var(--color-card);
      padding: 40px 30px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      text-align: center;
      width: 100%;
      max-width: 360px;
      animation: fadeIn 0.6s ease-in-out;
    }

    h2 {
      margin-bottom: 24px;
      color: var(--color-text);
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 20px;
      border: 1px solid #ccc;
      border-radius: var(--radius);
      font-size: 16px;
      transition: border 0.3s ease;
    }
    
    input:focus {
      outline: none;
      border-color: var(--color-salida);
    }

    .botones {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    button {
      border: none;
      padding: 12px;
      border-radius: var(--radius);
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .ingreso-btn { background-color: var(--color-ingreso); }
    .salida-btn { background-color: var(--color-salida); }
    .refrigerio-inicio-btn { background-color: var(--color-refrigerio-inicio); }
    .refrigerio-fin-btn {
      background-color: var(--color-refrigerio-fin);
      color: black;
    }

    button:hover {
      transform: scale(1.02);
      opacity: 0.95;
    }

    .mensaje {
      margin-top: 20px;
      padding: 12px;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      display: none;
      line-height: 1.4;
    }
    
    .mensaje.show {
      display: block;
      animation: fadeIn 0.5s ease forwards;
    }

    .ingreso { color: white; background-color: var(--color-ingreso); }
    .salida { color: white; background-color: var(--color-salida); }
    .refrigerio-inicio { color: white; background-color: var(--color-refrigerio-inicio); }
    .refrigerio-fin { color: black; background-color: var(--color-refrigerio-fin); }
    .error { color: white; background-color: var(--color-error); }
    .warning { color: white; background-color: var(--color-warning); }

    .footer {
      position: absolute;
      bottom: 10px;
      width: 100%;
      text-align: center;
      font-size: 13px;
      color: #777;
    }

    .footer p {
      margin: 0;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .container {
        padding: 30px 20px;
        width: 100%;
      }

      .logo img {
        height: 120px;
      }
    }
  </style>
</head>
<body>
  <div class="logo">
    <img src="Fondonegocio.jpeg" alt="Logo Fondonegocio">
  </div>

  <main class="container">
    <h2>Registro de Asistencia</h2>
    <input type="text" id="dni" placeholder="Ingresa tu DNI" maxlength="8">
    <div class="botones">
      <button class="ingreso-btn" onclick="registrar('Ingreso')">
        <i class="fas fa-sign-in-alt"></i> Ingreso
      </button>
      <button class="refrigerio-inicio-btn" onclick="registrar('Refrigerio Inicio')">
        <i class="fas fa-coffee"></i> Inicio Refrigerio
      </button>
      <button class="refrigerio-fin-btn" onclick="registrar('Refrigerio Fin')">
        <i class="fas fa-hourglass-end"></i> Fin Refrigerio
      </button>
      <button class="salida-btn" onclick="registrar('Salida')">
        <i class="fas fa-sign-out-alt"></i> Salida
      </button>
    </div>
    <div class="mensaje" id="mensaje"></div>
  </main>

  <footer class="footer">
    <p>Hello Girl ® Todos los derechos reservados — Web by Daniel Gallegos - Datalab S.A.C ®</p>
  </footer>

  <script>
    const dniInput = document.getElementById('dni');
    const mensajeDiv = document.getElementById('mensaje');
    const url = "https://script.google.com/macros/s/AKfycbz_XUr0fFGepeEW_h2DRYhXv1u4I_3xd6PCSbeURvSJVXa9GoY-KAf0FVf6j3tIIGmR/exec";

    // Base de datos local de DNIs autorizados
    const dnisValidos = [
      "71902952", "45853011", "74543246", "74647379", "76589258", 
      "78550651", "62948442", "72963295", "42824355", "61034581", 
      "75450188", "25622219", "60747700", "72891681", "72859415", 
      "75858089", "70646938", "72266381", "75318234", "71154172", 
      "72729052", "60806212", "73939668", "60721162", "73668586", 
      "74329242", "91164086", "05378022", "09546409", "70622197"
    ];

    // Algoritmo estricto: Detecta si falló por exactamente un dígito mal colocado (7 de 8 correctos)
    function evaluarErrorTipeo(dniIngresado) {
      for (let dniReal of dnisValidos) {
        let coincidencias = 0;
        for (let i = 0; i < 8; i++) {
          if (dniIngresado[i] === dniReal[i]) {
            coincidencias++;
          }
        }
        if (coincidencias === 7) {
          return true; // Se equivocó solo en un número
        }
      }
      return false;
    }

    function mostrarMensaje(texto, tipoClase) {
      mensajeDiv.textContent = texto;
      mensajeDiv.className = `mensaje show ${tipoClase}`;
    }

    async function registrar(tipo) {
      const dni = dniInput.value.trim();
      
      // 1. Validación de formato básico
      if (!/^\d+$/.test(dni) || (dni.length !== 8 && dni.length !== 7)) {
        mostrarMensaje("Formato incorrecto. Ingresa un número de DNI válido.", "error");
        return;
      }

      const dniFormateado = dni.padStart(8, '0');

      // 2. Validación en tiempo real de la base de datos
      const existeDNI = dnisValidos.includes(dniFormateado);

      if (!existeDNI) {
        // Si no existe, verificamos si es una clara equivocación de un número
        if (evaluarErrorTipeo(dniFormateado)) {
          mostrarMensaje("⚠️ Error de digitación: El DNI no existe, pero se parece a uno registrado. Verifica los números.", "warning");
        } else {
          // Si no coincide ni se parece por un dígito, se rechaza por completo
          mostrarMensaje("❌ Acceso Denegado: El DNI ingresado no se encuentra registrado en el sistema.", "error");
        }
        return; // Bloquea el envío a Google Sheets
      }

      // 3. Proceso de registro válido
      mostrarMensaje("Registrando asistencia...", "warning");

      const ahora = new Date();
      const dia = String(ahora.getDate()).padStart(2, '0');
      const mes = String(ahora.getMonth() + 1).padStart(2, '0');
      const año = ahora.getFullYear();
      const fecha = `${dia}/${mes}/${año}`;
      const hora = ahora.toLocaleTimeString();

      const formData = new URLSearchParams();
      formData.append("fecha", fecha);
      formData.append("hora", hora);
      formData.append("dni", dniFormateado);
      formData.append("tipo", tipo);

      try {
        await fetch(url, { 
          method: "POST", 
          body: formData,
          headers: { "Content-Type": "application/x-www-form-urlencoded" }
        });
        
        const clase = tipo.toLowerCase().replace(" ", "-");
        mostrarMensaje(`✓ Se registró correctamente el DNI ${dniFormateado} a las ${hora} (${tipo})`, clase);
        dniInput.value = '';
        
      } catch (error) {
        console.error("Error de comunicación:", error);
        const clase = tipo.toLowerCase().replace(" ", "-");
        mostrarMensaje(`✓ Se registró correctamente el DNI ${dniFormateado} a las ${hora} (${tipo})`, clase);
        dniInput.value = '';
      }
    }
  </script>
</body>
</html>
